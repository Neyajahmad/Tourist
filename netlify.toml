[build]
  base = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Environment variables are set in Netlify dashboard
# VITE_GOOGLE_MAPS_API_KEY = your_actual_key
# VITE_API_BASE_URL = https://tourist-vh25.onrender.com

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
