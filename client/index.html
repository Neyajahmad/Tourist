<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/net2vision-icon.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/net2vision-icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Net2Vision - Your AI-powered safety companion for secure travel and real-time emergency support" />
    <meta name="theme-color" content="#3B82F6" />
    <title>Net2Vision - Tourist Safety Platform</title>
    <!-- Google Maps API - Loaded via script tag -->
    <!-- API key is managed through environment variables -->
    <!-- See SETUP_INSTRUCTIONS.md for configuration -->
    <script 
      src="https://maps.googleapis.com/maps/api/js?key=GOOGLE_MAPS_API_KEY_PLACEHOLDER&callback=initMap&v=weekly"
      async
      defer
    ></script>
    <script>
      // Global callback for Google Maps API
      window.initMap = function() {
        console.log('Google Maps API loaded successfully');
      };
      
      // Global error handler for authentication failures
      window.gm_authFailure = function() {
        console.error('Google Maps authentication failed. Please check:');
        console.error('1. API key is valid and active');
        console.error('2. Billing is enabled for the project');
        console.error('3. Maps JavaScript API is enabled');
        console.error('4. API key restrictions allow this domain');
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
