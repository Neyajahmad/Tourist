<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield Background with Shadow -->
  <g filter="url(#shadow)">
    <path d="M96 12L24 42V84C24 127.5 49.5 166.5 96 180C142.5 166.5 168 127.5 168 84V42L96 12Z" fill="url(#gradient1)"/>
  </g>
  
  <!-- Inner Shield Highlight -->
  <path d="M96 24L36 48V84C36 120 57 153 96 165C135 153 156 120 156 84V48L96 24Z" fill="url(#gradient2)" opacity="0.3"/>
  
  <!-- Network Connection Lines -->
  <path d="M96 60L72 78L84 102L96 90L108 102L120 78L96 60Z" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  
  <!-- Eye/Vision Symbol - Outer -->
  <ellipse cx="96" cy="96" rx="36" ry="24" stroke="white" stroke-width="5" fill="none"/>
  
  <!-- Eye/Vision Symbol - Inner -->
  <circle cx="96" cy="96" r="16" fill="white"/>
  <circle cx="96" cy="96" r="10" fill="#3B82F6"/>
  <circle cx="99" cy="93" r="4" fill="white" opacity="0.8"/>
  
  <!-- Network Nodes -->
  <circle cx="72" cy="78" r="5" fill="white" filter="url(#glow)"/>
  <circle cx="120" cy="78" r="5" fill="white" filter="url(#glow)"/>
  <circle cx="84" cy="102" r="5" fill="white" filter="url(#glow)"/>
  <circle cx="108" cy="102" r="5" fill="white" filter="url(#glow)"/>
  
  <!-- Additional Network Nodes -->
  <circle cx="60" cy="96" r="4" fill="white" opacity="0.7"/>
  <circle cx="132" cy="96" r="4" fill="white" opacity="0.7"/>
  
  <!-- Connecting Lines to Additional Nodes -->
  <line x1="60" y1="96" x2="72" y2="78" stroke="white" stroke-width="2" opacity="0.3"/>
  <line x1="132" y1="96" x2="120" y2="78" stroke="white" stroke-width="2" opacity="0.3"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="gradient1" x1="24" y1="12" x2="168" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="36" y1="24" x2="156" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
